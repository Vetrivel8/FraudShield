spring.application.name=bankingfraudengine
spring.datasource.url=jdbc:mysql://localhost:3306/banking_fraud_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:vetrivel@08}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

fraud.high-amount-threshold=50000

